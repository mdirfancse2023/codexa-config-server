spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: codexa-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.microservice.codexa.ai.*"          

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: 172.20.10.5
    hostname: localhost

jwt:
  secret: Q9xA2fM7KpZ4Yt3LrW8B0S1N6HVaEeCJD8zP4TUm
  expiration: 3600

app:
  frontend:
    url: http://localhost:8080/frontend
  preview:
    domain: localhost
    namespace: codexa-ai
    proxy-port: 8090  

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG 
    org.apache.kafka.clients: WARN
    org.apache.kafka.common: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    config:
      enabled: false  

---

spring:
  config:
    activate:
      on-profile: k8s
  kafka:
    bootstrap-servers: kafka.codexa-ai.svc.cluster.local:9092
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false 

jwt:
  secret: ${JWT_SECRET}

app:
  frontend:
    url: ${FRONTEND_URL}
  preview:
    domain: ${PREVIEW_DOMAIN}
    namespace: ${PREVIEW_NAMESPACE}
    proxy-port: ${PROXY_PORT} 

ACCOUNT_SERVICE_URI: http://account-service
WORKSPACE_SERVICE_URI: http://workspace-service 
INTELLIGENCE_SERVICE_URI: http://intelligence-service       


